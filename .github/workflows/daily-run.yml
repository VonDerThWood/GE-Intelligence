name: GE Intelligence — Daily Run

on:
  schedule:
    - cron: "0 8 * * *"

  push:
    branches: [main]

  workflow_dispatch:

jobs:
  fetch-and-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run GE Intelligence
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python run.py

      - name: Commit updated data
        run: |
          git config --global user.name  "GE Intelligence Bot"
          git config --global user.email "ge-bot@users.noreply.github.com"
          git add data/latest.json data/alerts.json || true
          git diff --staged --quiet || git commit -m "chore: update market data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}